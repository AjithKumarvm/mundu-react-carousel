<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="Mundu React Carousel - A lightweight, zero-dependency carousel for React">
  <title>Mundu React Carousel</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      border: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #fafafa;
      color: #333;
      line-height: 1.6;
    }

    .header {
      width: 100%;
      background: #fff;
      padding: 40px 20px 30px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    .colored {
      font-size: 2.5rem;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #ba11c5, #ca0a6b);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .headerSubText {
      color: #888;
      font-weight: 400;
      margin: 0 0 20px;
      font-size: 0.95rem;
    }

    .badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge--ts {
      background: #3178c6;
      color: #fff;
    }

    .badge--react {
      background: #61dafb;
      color: #222;
    }

    .badge--zero {
      background: #2ecc71;
      color: #fff;
    }

    .badge--light {
      background: #f39c12;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    .carouselArea {
      width: 100%;
      text-align: center;
      padding: 50px 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .carousel {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border-radius: 10px;
    }

    .install-section {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 24px;
      margin: 32px 0;
    }

    .install-section code {
      display: block;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 8px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    .install-section code + code {
      margin-top: 6px;
    }

    h2 {
      font-size: 1.5rem;
      margin: 40px 0 8px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
    }

    h3 {
      font-size: 1.1rem;
      margin: 24px 0 8px;
      color: #555;
    }

    .props-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e8e8e8;
    }

    .props-table thead {
      background: #1e1e2e;
      color: #cdd6f4;
    }

    .props-table th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .props-table td {
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      vertical-align: top;
    }

    .props-table tr:hover td {
      background: #f9f9fb;
    }

    .props-table .prop-name {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #ba11c5;
      font-weight: 600;
      white-space: nowrap;
    }

    .props-table .prop-type {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #3178c6;
    }

    .props-table .prop-default {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #666;
    }

    .code {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 20px;
      overflow-x: auto;
      border-radius: 10px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      margin: 12px 0;
      border: 1px solid #313244;
    }

    .tip {
      background: #fff;
      border-left: 4px solid #ba11c5;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 0 10px 10px 0;
      border: 1px solid #e8e8e8;
      border-left: 4px solid #ba11c5;
    }

    .tip-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: #ba11c5;
    }

    .tip p {
      margin: 0;
      font-size: 0.9rem;
      color: #555;
    }

    .footer {
      text-align: center;
      padding: 30px 20px;
      color: #999;
      font-size: 0.85rem;
      border-top: 1px solid #eee;
    }

    .footer a {
      color: #ba11c5;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .section-desc {
      color: #666;
      font-size: 0.95rem;
      margin: 4px 0 16px;
    }

    @media (max-width: 600px) {
      .colored {
        font-size: 1.8rem;
      }

      .props-table {
        font-size: 0.8rem;
      }

      .props-table th,
      .props-table td {
        padding: 8px 10px;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BqaUb4NH.js"></script>
</head>

<body>
  <div id="app"></div>
</body>

</html>
